networks:
  denky_net:
    driver: bridge

volumes:
  postgres_data:
  frontend_static:
  frontend_node_modules:
  media_files:

x-backend-app-image: &backend-app-image
  image: denky_backend:local
  build:
    context: ./backend
  pull_policy: never

services:

  db:
    image: postgres:16-alpine
    container_name: denky_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-denky}
      POSTGRES_USER: ${DB_USER:-denky}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-denky}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - denky_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  backend:
    <<: *backend-app-image
    pull_policy: build
    container_name: denky_backend
    command: gunicorn core.wsgi:application -c gunicorn.conf.py
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./backend/staticfiles:/app/staticfiles
      - media_files:/app/media
    env_file:
      - ./.env
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-core.settings.production}
      GUNICORN_RELOAD: ${GUNICORN_RELOAD:-true}
      RUN_MIGRATIONS: "true"
      RUN_COLLECTSTATIC: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - denky_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health/"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_VITE_API_URL: ${VITE_API_URL:-/api/v1}
        BUILD_VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-https://denky.dev.br}
    container_name: denky_frontend
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - frontend_static:/app/dist
    networks:
      - denky_net
    profiles: ["static"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/dist/index.html"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend_dev:
    image: node:22-bookworm-slim
    container_name: denky_frontend_dev
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      VITE_API_URL: /api/v1
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - denky_net
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    container_name: denky_nginx
    restart: unless-stopped
    environment:
      FRONTEND_SERVE_MODE: ${FRONTEND_SERVE_MODE:-dev}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MODE="$${FRONTEND_SERVE_MODE:-dev}"
        case "$$MODE" in dev|static) ;; *)
          echo "nginx: FRONTEND_SERVE_MODE invalido '$$MODE' (use dev ou static)" >&2
          exit 1
        esac
        cp "/etc/nginx/frontend_serve_$$MODE.conf" /etc/nginx/frontend_serve.conf
        echo "nginx: frontend em modo '$$MODE'"
        exec nginx -g 'daemon off;'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/frontend_serve_dev.conf:/etc/nginx/frontend_serve_dev.conf:ro
      - ./nginx/frontend_serve_static.conf:/etc/nginx/frontend_serve_static.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./backend/staticfiles:/var/www/static:ro
      - media_files:/var/www/media:ro
      - frontend_static:/var/www/frontend:ro
    depends_on:
      backend:
        condition: service_started
      frontend_dev:
        condition: service_started
        required: false
      frontend:
        condition: service_started
        required: false
    networks:
      - denky_net
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
