add_header X-Frame-Options          "SAMEORIGIN"                           always;
add_header X-Content-Type-Options   "nosniff"                              always;
add_header X-XSS-Protection         "1; mode=block"                        always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
add_header Permissions-Policy       "camera=(), geolocation=(), microphone=()" always;
add_header Content-Security-Policy  "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' http: https: ws: wss: https://cloudflareinsights.com;" always;
