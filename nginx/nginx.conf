events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    client_max_body_size 10M;

    # DNS embarcado do Docker — obrigatório quando proxy_pass usa variáveis ($upstream)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen 80;
        server_name denky.dev.br www.denky.dev.br localhost;

        set $frontend_upstream http://frontend_dev:3000;

        location ^~ /static/ {
            alias /var/www/static/;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location ^~ /media/ {
            alias /var/www/media/;
            add_header Cache-Control "public, max-age=86400" always;
        }

        # proxy_pass direto (sem variável) — mais estável para o backend
        location ^~ /api/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            include /etc/nginx/security_headers.conf;
        }

        location = /admin {
            return 301 /admin/;
        }

        location ^~ /admin/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            include /etc/nginx/security_headers.conf;
        }

        include /etc/nginx/frontend_serve.conf;
    }
}
